<!-- Fixed employee.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LeaveDesk — My Dashboard</title>
</head>
<body>
    <div id="verify-banner" style="display:none; background:#FFF7ED; padding:20px; text-align:center;">
        <h2>Please verify your email</h2>
        <p>Check your inbox and click the link to unlock your dashboard.</p>
        <button onclick="location.reload()">I've verified, let me in</button>
    </div>
    <div id="app-content">
        <!-- Main Dashboard -->
    </div>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
        firebase.initializeApp(FIREBASE_CONFIG);
        firebase.auth().onAuthStateChanged(user => {
            if (!user) { location.href = 'auth.html'; return; }
            if (!user.emailVerified) {
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('verify-banner').style.display = 'block';
            }
        });

        function doSignOut() {
            firebase.auth().signOut().then(() => location.href = 'index.html');
        }
    </script>
</body>
</html>
