<!-- Fixed auth.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LeaveDesk — Sign in</title>
    <style>/* Original Styles preserved */</style>
</head>
<body>
    <!-- Auth forms here -->
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp(FIREBASE_CONFIG);
        const auth = firebase.auth();
        const db = firebase.database();

        function showMode(m) {
            document.getElementById('form-login').style.display = (m === 'login') ? 'block' : 'none';
            document.getElementById('form-signup').style.display = (m === 'signup') ? 'block' : 'none';
            // Reset error states on switch
            document.querySelectorAll('.err-msg').forEach(el => el.style.display = 'none');
        }

        async function doSignup() {
            const name = document.getElementById('su-name').value.trim();
            const email = document.getElementById('su-email').value.trim();
            const pw = document.getElementById('su-pw').value;

            if (name.split(' ').filter(Boolean).length < 2) {
                alert("Please enter full name (First and Last).");
                return;
            }

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pw);
                await cred.user.updateProfile({ displayName: name });
                await db.ref('users/' + cred.user.uid).set({ name, email, joined: Date.now() });
                await cred.user.sendEmailVerification();
                await auth.signOut();
                alert("Account created! Please check your email for the verification link.");
                showMode('login');
            } catch (e) {
                alert(e.message);
            }
        }
    </script>
</body>
</html>
