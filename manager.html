<!-- Fixed manager.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LeaveDesk — Manager Portal</title>
    <style>#mgmt-content { display: none; }</style>
</head>
<body>
    <div id="login-lock">
        <h2>Manager Access Required</h2>
        <input type="password" id="mgr-pass" placeholder="Enter password">
        <button onclick="verifyManager()">Unlock</button>
    </div>

    <div id="mgmt-content">
        <h1>Welcome, Manager</h1>
        <!-- Management UI here -->
    </div>

    <script>
        const M_KEY = "admin4321"; // Local security check
        function verifyManager() {
            const val = document.getElementById('mgr-pass').value;
            if (val === M_KEY) {
                document.getElementById('login-lock').style.display = 'none';
                document.getElementById('mgmt-content').style.display = 'block';
            } else {
                alert("Incorrect password.");
            }
        }
    </script>
</body>
</html>
